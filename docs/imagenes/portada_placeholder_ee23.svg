<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-labelledby="title desc">
  <title id="title">Portada de prueba Escuela Especial 23</title>
  <desc id="desc">Imagen de prueba en tonos naranjas para usar en el README del centro de recursos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)" rx="20"/>
  <circle cx="1130" cy="80" r="110" fill="#fdba74" opacity="0.35"/>
  <circle cx="1030" cy="250" r="140" fill="#fed7aa" opacity="0.18"/>
  <rect x="70" y="70" width="14" height="180" fill="#fff7ed" rx="7"/>
  <text x="115" y="125" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#fff7ed">
    Escuela de Educacion Especial 23
  </text>
  <text x="115" y="175" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#ffedd5">
    Centro de recursos institucional
  </text>
  <text x="115" y="220" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#ffedd5">
